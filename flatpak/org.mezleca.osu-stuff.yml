id: org.mezleca.osu-stuff
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: osu-stuff
finish-args:
    - "--share=network"
    - "--socket=wayland"
    - "--socket=fallback-x11"
    - "--socket=pulseaudio"
    - "--device=all"
    - "--filesystem=home:ro"
    - "--filesystem=~/.local/share/osu-stuff:create" # config / bs

build-options:
  append-path: /usr/lib/sdk/llvm20/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
  build-args:
    - "--share=network" # realm downloads openssl even if i set FETCH_MISSING_DEPENDENCIES to off...
  env:
    CC: clang
    CXX: clang++

modules:
  - name: flatpak-assets
    buildsystem: simple
    build-commands:
      - install -Dm644 org.mezleca.osu-stuff.desktop /app/share/applications/org.mezleca.osu-stuff.desktop
      - install -Dm644 org.mezleca.osu-stuff.metainfo.xml /app/share/metainfo/org.mezleca.osu-stuff.metainfo.xml
      - install -Dm644 org.mezleca.osu-stuff.png /app/share/icons/hicolor/512x512/apps/org.mezleca.osu-stuff.png
    sources:
      - type: dir
        path: .

  # realm needs that
  - name: libuv
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
        - "-DBUILD_TESTING=OFF"
    sources:
      - type: dir
        path: ../vendor/libuv

  - name: osu-stuff
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
        - "-Wno-dev"
        - "-DCMAKE_BUILD_TYPE=Release"
    sources:
      - type: dir
        path: ..
